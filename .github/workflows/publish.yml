name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install Vite+
        run: npm install -g vite-plus

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

      - name: Test
        run: vp test run

      - name: Publish to npm (Trusted Publisher with token fallback)
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          set +e
          npm publish --provenance --access public 2>&1 | tee /tmp/npm-publish.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "npm error code E404" /tmp/npm-publish.log && [ -n "${NPM_TOKEN:-}" ]; then
            echo "Trusted Publisher not active for this package yet; retrying with NPM_TOKEN bootstrap publish."
            printf "//registry.npmjs.org/:_authToken=%s\n" "$NPM_TOKEN" > "$HOME/.npmrc"
            npm publish --access public
            exit 0
          fi

          exit "$status"
