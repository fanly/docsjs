name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Install Vite+
        run: npm install -g vite-plus

      - name: Install dependencies
        run: vp install

      - name: Verify
        run: vp run verify

      - name: Debug OIDC claims for npm trusted publish
        run: |
          OIDC_JSON=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")
          OIDC_TOKEN=$(echo "$OIDC_JSON" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{process.stdout.write(JSON.parse(s).value)})")
          OIDC_PAYLOAD=$(node -e "const t=process.argv[1].split('.')[1];process.stdout.write(Buffer.from(t,'base64url').toString('utf8'))" "$OIDC_TOKEN")
          echo "OIDC claims (sanitized):"
          echo "$OIDC_PAYLOAD" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const c=JSON.parse(s);const out={iss:c.iss,aud:c.aud,sub:c.sub,repository:c.repository,repository_owner:c.repository_owner,workflow:c.workflow,workflow_ref:c.workflow_ref,job_workflow_ref:c.job_workflow_ref,ref:c.ref,sha:c.sha,run_id:c.run_id,run_number:c.run_number};console.log(JSON.stringify(out,null,2));})"

      - name: Publish to npm
        run: npm publish --provenance --access public
