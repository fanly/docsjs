name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vite+
        run: npm install -g vite-plus

      - name: Install dependencies
        run: vp install

      - name: Lint
        run: vp lint .

      - name: Format check
        run: vp check --no-lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: vp build

      - name: Test
        run: vp test run
